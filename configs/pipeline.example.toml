[pipeline]
# Put YOLO connector crops here first. Later stages can switch this to pin-band crops
# or connector crops depending on which profile you are building.
image_dir = "data/connector_crops"
output_dir = "outputs/connector_clustering"

image_size = 224
dinov2_model = "facebook/dinov2-small"
batch_size = 16

pca_components = 50
hdbscan_min_cluster_size = 15
hdbscan_min_samples = 5
review_samples_per_cluster = 30
unknown_distance_quantile = 0.995

# Pin-band structural features are standardized, multiplied by this weight,
# then concatenated with normalized DINOv2 embeddings.
structural_weight = 2.0
dinobank_pca_components = 50
dinobank_threshold_quantile = 0.995
dinobank_histogram_bins = 30
dinobank_montage_samples = 30
projection_profile_dims = 128
structural_image_size = [20, 512] # [height, width], or "null" to use original size
bright_threshold = 0.65
edge_threshold = 0.12
peak_threshold_std = 0.5
peak_min_distance = 3

random_state = 42
